spring:
  application:
    name: argus
  mvc:
    servlet:
      path: /api/v1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        readiness:
          include: readinessState,db,vendorEmail
  info:
    env:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

info:
  app:
    name: ${spring.application.name}
    version: @project.version@

logging:
  level:
    root: INFO
    io.github.rafaeljc.argus: INFO

resilience4j:
  circuitbreaker:
    instances:
      vendor-email:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

argus:
  email:
    poll:
      interval-ms: 30000
  rate-limit:
    # Bucket keys are wrapped in "[...]" so Spring's relaxed binder treats the dots as part of
    # the map key instead of nesting (RL.auth.signup -> RL -> auth -> signup). Do not unquote.
    buckets:
      "[RL.auth.signup]":
        capacity: 5
        refill-tokens: 5
        refill-duration: PT1H
      "[RL.auth.login]":
        capacity: 10
        refill-tokens: 10
        refill-duration: PT15M
      "[RL.auth.reset]":
        capacity: 3
        refill-tokens: 3
        refill-duration: PT1H
      "[RL.unauth.global]":
        capacity: 100
        refill-tokens: 100
        refill-duration: PT1M
      "[RL.read]":
        capacity: 300
        refill-tokens: 300
        refill-duration: PT1M
      "[RL.write]":
        capacity: 60
        refill-tokens: 60
        refill-duration: PT1M
