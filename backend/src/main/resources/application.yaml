spring:
  application:
    name: argus
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  info:
    env:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

info:
  app:
    name: ${spring.application.name}
    version: @project.version@

logging:
  level:
    root: INFO
    io.github.rafaeljc.argus: INFO
