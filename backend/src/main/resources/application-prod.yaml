spring:
  datasource:
    url: ${ARGUS_DB_URL}
    username: ${ARGUS_DB_USER}
    password: ${ARGUS_DB_PASSWORD}
    hikari:
      pool-name: argus-pool

server:
  # Prod runs behind a TLS-terminating LB. `framework` installs ForwardedHeaderFilter so
  # getRemoteAddr() / getScheme() reflect the original client via X-Forwarded-* headers.
  # Only safe in environments with a trusted hop in front — left at default (none) elsewhere
  # so direct clients can't spoof their IP.
  forward-headers-strategy: framework
